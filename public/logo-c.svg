<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 260 64"
  fill="none"
  width="auto"
  height="38"
>
  <defs>
    <linearGradient id="cylinder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(2 2)">
    <ellipse cx="28" cy="18" rx="22" ry="7" fill="url(#cylinder)" opacity=".45"/>

    <rect
      x="6"
      y="18"
      width="44"
      height="28"
      rx="2"
      fill="url(#cylinder)"
    />

    <ellipse cx="28" cy="46" rx="22" ry="7" fill="url(#cylinder)"/>
    <ellipse cx="28" cy="18" rx="22" ry="7" fill="url(#cylinder)" opacity=".65"/>

    <line x1="14" y1="22" x2="14" y2="44"
      stroke="#93c5fd"
      stroke-width="1.2"
      opacity=".5"/>

    <line x1="28" y1="20" x2="28" y2="46"
      stroke="#93c5fd"
      stroke-width="1.2"
      opacity=".5"/>

    <line x1="42" y1="22" x2="42" y2="44"
      stroke="#93c5fd"
      stroke-width="1.2"
      opacity=".5"/>
  </g>

  <!-- Wordmark -->
  <text
    x="72"
    y="40"
    font-family="Inter, system-ui, sans-serif"
    font-size="28"
    font-weight="700"
    fill="currentColor"
    letter-spacing="-1"
  >
    ctrodb
  </text>
</svg>